Section "Monitor"
    Identifier "Monitor0"
    # Generated by cvt 1280 720 60
    # 由 cvt 1280 720 60 生成的 Modeline
    Modeline "1280x720_60.00" 74.50 1280 1344 1472 1664 720 723 728 748 -hsync +vsync
    Option "PreferredMode" "1280x720_60.00"
EndSection

Section "Device"
    Identifier "GPU0"
    Driver "modesetting"
    Option "AccelMethod" "glamor"
    Option "DRI" "3"
EndSection

Section "Screen"
    Identifier "Screen0"
    Device "GPU0"
    Monitor "Monitor0"
    SubSection "Display"
        Modes "1280x720_60.00"
        # Virtual must be >= the resolution of the mode used
        # Virtual 必须 >= 所用模式的分辨率
        Virtual 1280 720
    EndSubSection
EndSection
