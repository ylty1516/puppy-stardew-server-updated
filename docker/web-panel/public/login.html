<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puppy Stardew - Login</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <script>
    (() => {
      const savedTheme = localStorage.getItem('panel_theme');
      const theme = savedTheme === 'light' || savedTheme === 'dark'
        ? savedTheme
        : (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <style>
    :root {
      --bg-primary: #0f1923;
      --bg-card: #1a2736;
      --bg-field: #243447;
      --bg-soft: rgba(15, 25, 35, 0.45);
      --bg-toggle: rgba(36, 52, 71, 0.92);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: #2d3f52;
      --accent: #4ade80;
      --accent-dark: #22c55e;
      --danger: #ef4444;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      --success-shadow: 0 20px 70px rgba(74, 222, 128, 0.25);
    }

    :root[data-theme='light'] {
      --bg-primary: #eef5f0;
      --bg-card: #ffffff;
      --bg-field: #edf4ee;
      --bg-soft: rgba(223, 235, 226, 0.8);
      --bg-toggle: rgba(255, 255, 255, 0.94);
      --text-primary: #162119;
      --text-secondary: #4b6351;
      --text-muted: #6f8374;
      --border: #d7e4da;
      --accent: #16a34a;
      --accent-dark: #15803d;
      --danger: #dc2626;
      --shadow: 0 18px 40px rgba(22, 33, 25, 0.08);
      --success-shadow: 0 20px 60px rgba(22, 163, 74, 0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background:
        radial-gradient(circle at top, rgba(74, 222, 128, 0.14), transparent 34%),
        var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .icon {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .login-container {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 48px 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .login-container::before {
      content: '';
      position: absolute;
      inset: 0 0 auto;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.9;
    }

    .top-actions {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 8px;
    }

    .theme-toggle,
    .lang-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      background: var(--bg-toggle);
      color: var(--text-primary);
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .theme-toggle {
      padding: 8px;
    }

    .lang-toggle span {
      font-size: 13px;
      font-weight: 600;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-mark {
      width: 56px;
      height: 56px;
      color: var(--accent);
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark .icon {
      width: 100%;
      height: 100%;
    }

    .login-logo h1 {
      font-size: 22px;
      color: var(--accent);
    }

    .login-logo p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-top: 6px;
    }

    .auth-copy {
      margin-bottom: 20px;
    }

    .auth-copy h2 {
      font-size: 21px;
      margin-bottom: 6px;
    }

    .auth-copy p {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.5;
    }

    .feedback {
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .feedback.show { display: block; }
    .feedback.error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--danger);
    }

    .feedback.success {
      background: rgba(74, 222, 128, 0.14);
      border: 1px solid rgba(74, 222, 128, 0.28);
      color: var(--accent);
    }

    .loading-state {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 16px;
    }

    .auth-form.hidden,
    .loading-state.hidden {
      display: none;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-field);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.12);
    }

    .validation-list {
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin: -4px 0 18px;
      display: grid;
      gap: 10px;
    }

    .rule {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .rule-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--text-muted);
      flex-shrink: 0;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .rule.valid { color: var(--accent); }
    .rule.valid .rule-dot {
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.12);
    }

    .rule.invalid { color: var(--danger); }
    .rule.invalid .rule-dot { background: var(--danger); }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #0f1923;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }

    .login-btn:hover { background: var(--accent-dark); transform: translateY(-1px); }
    .login-btn:disabled {
      background: #374151;
      color: #6b7280;
      cursor: not-allowed;
      transform: none;
    }

    .login-container.success-pulse {
      animation: successPulse 0.7s ease;
    }

    @keyframes successPulse {
      0% { box-shadow: var(--shadow); }
      50% { box-shadow: var(--success-shadow); }
      100% { box-shadow: var(--shadow); }
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 52px 22px 28px;
      }
    }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden">
    <symbol id="icon-dog" viewBox="0 0 100 100">
      <image href="/favicon.png" x="0" y="0" width="100" height="100"/>
    </symbol>
    <symbol id="icon-globe" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="8.5" />
        <path d="M3.8 12h16.4" />
        <path d="M12 3.5c2 2 3.1 5 3.1 8.5S14 18.5 12 20.5c-2-2-3.1-5-3.1-8.5S10 5.5 12 3.5Z" />
      </g>
    </symbol>
    <symbol id="icon-theme-light" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4" />
        <path d="M12 2.5v2.2" />
        <path d="M12 19.3v2.2" />
        <path d="m4.9 4.9 1.6 1.6" />
        <path d="m17.5 17.5 1.6 1.6" />
        <path d="M2.5 12h2.2" />
        <path d="M19.3 12h2.2" />
        <path d="m4.9 19.1 1.6-1.6" />
        <path d="m17.5 6.5 1.6-1.6" />
      </g>
    </symbol>
    <symbol id="icon-theme-dark" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18.5 14.5a6.8 6.8 0 1 1-9-9 7.6 7.6 0 0 0 9 9Z" />
      </g>
    </symbol>
  </svg>

  <div class="login-container" id="loginContainer">
    <div class="top-actions">
      <button class="theme-toggle" id="themeToggle" type="button">
        <svg class="icon"><use href="#icon-theme-light"></use></svg>
      </button>
      <button class="lang-toggle" id="langToggle" type="button">
        <svg class="icon"><use href="#icon-globe"></use></svg>
        <span id="langToggleLabel">EN</span>
      </button>
    </div>

    <div class="login-logo">
      <div class="logo-mark"><svg class="icon"><use href="#icon-dog"></use></svg></div>
      <h1>Puppy Stardew Server</h1>
      <p data-i18n="login.subtitle">Server Management Panel</p>
    </div>

    <div class="auth-copy">
      <h2 id="formTitle">...</h2>
      <p id="formSubtitle">...</p>
    </div>

    <div id="feedback" class="feedback"></div>
    <div id="loadingState" class="loading-state" data-i18n="general.loading">Loading...</div>

    <form id="loginForm" class="auth-form hidden" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="password" data-i18n="login.password">Password</label>
        <input type="password" id="password" data-i18n-placeholder="login.placeholder" placeholder="Enter panel password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn" id="loginBtn" data-i18n="login.button">Login</button>
    </form>

    <form id="setupForm" class="auth-form hidden" onsubmit="handleSetup(event)">
      <div class="form-group">
        <label for="setupPassword" data-i18n="setup.password">Password</label>
        <input type="password" id="setupPassword" data-i18n-placeholder="setup.password" placeholder="Password" autocomplete="new-password" required>
      </div>
      <div class="form-group">
        <label for="confirmPassword" data-i18n="setup.confirm">Confirm Password</label>
        <input type="password" id="confirmPassword" data-i18n-placeholder="setup.confirm" placeholder="Confirm Password" autocomplete="new-password" required>
      </div>
      <div class="validation-list">
        <div class="rule" id="ruleLength">
          <span class="rule-dot"></span>
          <span data-i18n="setup.minLength">Password must be at least 6 characters</span>
        </div>
        <div class="rule" id="ruleMatch">
          <span class="rule-dot"></span>
          <span data-i18n="setup.mismatch">Passwords do not match</span>
        </div>
      </div>
      <button type="submit" class="login-btn" id="setupBtn" data-i18n="setup.button" disabled>Get Started</button>
    </form>
  </div>

  <script>
    let currentMode = 'loading';
    let currentLang = detectLanguage();
    let currentTheme = detectTheme();

    const translations = {
      zh: {
        'general.loading': '正在检查面板状态...',
        'lang.toggle': '切换语言',
        'login.subtitle': '服务器管理面板',
        'login.title': '登录管理面板',
        'login.description': '输入您设置的管理密码以继续。',
        'login.password': '密码',
        'login.placeholder': '请输入管理密码',
        'login.button': '登录',
        'login.loading': '登录中...',
        'login.failed': '登录失败',
        'login.connection': '连接失败，请确认面板服务已启动。',
        'login.redirecting': '验证通过，正在跳转...',
        'setup.title': '设置管理密码',
        'setup.subtitle': '首次使用，请设置您的管理密码',
        'setup.password': '设置密码',
        'setup.confirm': '确认密码',
        'setup.button': '开始使用',
        'setup.loading': '设置中...',
        'setup.minLength': '密码至少需要6个字符',
        'setup.mismatch': '两次输入的密码不一致',
        'setup.success': '密码设置成功！',
        'setup.failed': '设置失败',
        'theme.light': '切换到亮色模式',
        'theme.dark': '切换到暗色模式',
      },
      en: {
        'general.loading': 'Checking panel status...',
        'lang.toggle': 'Switch language',
        'login.subtitle': 'Server Management Panel',
        'login.title': 'Sign In',
        'login.description': 'Enter your admin password to continue.',
        'login.password': 'Password',
        'login.placeholder': 'Enter panel password',
        'login.button': 'Login',
        'login.loading': 'Logging in...',
        'login.failed': 'Login failed',
        'login.connection': 'Connection failed. Confirm that the panel service is running.',
        'login.redirecting': 'Verified. Redirecting...',
        'setup.title': 'Set Admin Password',
        'setup.subtitle': 'First time setup - please create your admin password',
        'setup.password': 'Password',
        'setup.confirm': 'Confirm Password',
        'setup.button': 'Get Started',
        'setup.loading': 'Setting password...',
        'setup.minLength': 'Password must be at least 6 characters',
        'setup.mismatch': 'Passwords do not match',
        'setup.success': 'Password set successfully!',
        'setup.failed': 'Setup failed',
        'theme.light': 'Switch to light mode',
        'theme.dark': 'Switch to dark mode',
      },
    };

    function detectLanguage() {
      const saved = localStorage.getItem('panel_lang');
      if (saved === 'zh' || saved === 'en') return saved;
      return (navigator.language || '').toLowerCase().startsWith('zh') ? 'zh' : 'en';
    }

    function detectTheme() {
      const saved = localStorage.getItem('panel_theme');
      if (saved === 'light' || saved === 'dark') return saved;
      return window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }

    function t(key) {
      return (translations[currentLang] && translations[currentLang][key]) || key;
    }

    function applyTranslations() {
      document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
      document.title = currentMode === 'setup' ? `Puppy Stardew - ${t('setup.title')}` : 'Puppy Stardew - Login';

      document.querySelectorAll('[data-i18n]').forEach((el) => {
        el.textContent = t(el.dataset.i18n);
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach((el) => {
        el.setAttribute('placeholder', t(el.dataset.i18nPlaceholder));
      });

      document.getElementById('langToggle').title = t('lang.toggle');
      document.getElementById('langToggleLabel').textContent = currentLang === 'zh' ? 'EN' : '中文';
      document.getElementById('formTitle').textContent = t(currentMode === 'setup' ? 'setup.title' : 'login.title');
      document.getElementById('formSubtitle').textContent = t(currentMode === 'setup' ? 'setup.subtitle' : 'login.description');
      applyTheme();
      updateSetupValidation();
    }

    function applyTheme() {
      document.documentElement.dataset.theme = currentTheme;
      const themeIcon = document.querySelector('#themeToggle use');
      if (themeIcon) {
        themeIcon.setAttribute('href', currentTheme === 'dark' ? '#icon-theme-light' : '#icon-theme-dark');
      }
      document.getElementById('themeToggle').title = t(currentTheme === 'dark' ? 'theme.light' : 'theme.dark');
    }

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('loginForm').classList.toggle('hidden', mode !== 'login');
      document.getElementById('setupForm').classList.toggle('hidden', mode !== 'setup');
      applyTranslations();

      const target = mode === 'setup' ? document.getElementById('setupPassword') : document.getElementById('password');
      target.focus();
    }

    function setFeedback(message, type = 'error') {
      const feedback = document.getElementById('feedback');
      feedback.textContent = message;
      feedback.className = `feedback show ${type}`;
    }

    function clearFeedback() {
      const feedback = document.getElementById('feedback');
      feedback.className = 'feedback';
      feedback.textContent = '';
    }

    function updateSetupValidation() {
      const password = document.getElementById('setupPassword');
      const confirmPassword = document.getElementById('confirmPassword');
      const setupBtn = document.getElementById('setupBtn');

      if (!password || !confirmPassword || !setupBtn) return;

      const hasLength = password.value.length >= 6;
      const hasMatch = confirmPassword.value.length > 0 && password.value === confirmPassword.value;

      document.getElementById('ruleLength').className = `rule ${password.value ? (hasLength ? 'valid' : 'invalid') : ''}`.trim();
      document.getElementById('ruleMatch').className = `rule ${confirmPassword.value ? (hasMatch ? 'valid' : 'invalid') : ''}`.trim();

      setupBtn.disabled = !(hasLength && hasMatch);
    }

    async function request(url, options = {}) {
      const response = await fetch(url, {
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options,
      });

      let data = {};
      try {
        data = await response.json();
      } catch (err) {
        data = {};
      }

      return { response, data };
    }

    async function verifyExistingToken() {
      const token = localStorage.getItem('panel_token');
      if (!token) return false;

      try {
        const { response } = await request('/api/auth/verify', {
          headers: { Authorization: `Bearer ${token}` },
        });

        if (response.ok) {
          setFeedback(t('login.redirecting'), 'success');
          window.location.href = '/';
          return true;
        }
      } catch (err) {
        return false;
      }

      return false;
    }

    async function initializePage() {
      applyTranslations();

      try {
        const { response, data } = await request('/api/auth/status');
        if (!response.ok) {
          throw new Error('status failed');
        }

        if (data.needsSetup) {
          setMode('setup');
          return;
        }

        setMode('login');
        await verifyExistingToken();
      } catch (err) {
        setMode('login');
        setFeedback(t('login.connection'), 'error');
      }
    }

    async function handleLogin(event) {
      event.preventDefault();
      clearFeedback();

      const button = document.getElementById('loginBtn');
      const password = document.getElementById('password').value;
      button.disabled = true;
      button.textContent = t('login.loading');

      try {
        const { response, data } = await request('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ password }),
        });

        if (response.ok) {
          localStorage.setItem('panel_token', data.token);
          window.location.href = '/';
          return;
        }

        if (data.needsSetup) {
          setMode('setup');
          setFeedback(t('setup.subtitle'), 'error');
          return;
        }

        let message = data.error || t('login.failed');
        if (data.attemptsRemaining !== undefined) {
          message += ` (${data.attemptsRemaining})`;
        }
        setFeedback(message, 'error');
      } catch (err) {
        setFeedback(t('login.connection'), 'error');
      } finally {
        button.disabled = false;
        button.textContent = t('login.button');
      }
    }

    async function handleSetup(event) {
      event.preventDefault();
      clearFeedback();
      updateSetupValidation();

      const password = document.getElementById('setupPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const button = document.getElementById('setupBtn');

      if (button.disabled) return;

      button.disabled = true;
      button.textContent = t('setup.loading');
      let shouldRedirect = false;

      try {
        const { response, data } = await request('/api/auth/setup', {
          method: 'POST',
          body: JSON.stringify({ password, confirmPassword }),
        });

        if (!response.ok) {
          if (response.status === 403) {
            setMode('login');
          }
          setFeedback(data.error || t('setup.failed'), 'error');
        } else {
          localStorage.setItem('panel_token', data.token);
          document.getElementById('loginContainer').classList.add('success-pulse');
          setFeedback(t('setup.success'), 'success');
          shouldRedirect = true;
          setTimeout(() => {
            window.location.href = '/';
          }, 900);
        }
      } catch (err) {
        setFeedback(t('login.connection'), 'error');
      } finally {
        if (!shouldRedirect) {
          updateSetupValidation();
          button.textContent = t('setup.button');
        }
      }
    }

    document.getElementById('langToggle').addEventListener('click', () => {
      currentLang = currentLang === 'en' ? 'zh' : 'en';
      localStorage.setItem('panel_lang', currentLang);
      applyTranslations();
    });

    document.getElementById('themeToggle').addEventListener('click', () => {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('panel_theme', currentTheme);
      applyTheme();
    });

    document.getElementById('setupPassword').addEventListener('input', updateSetupValidation);
    document.getElementById('confirmPassword').addEventListener('input', updateSetupValidation);

    initializePage();
  </script>
</body>
</html>
